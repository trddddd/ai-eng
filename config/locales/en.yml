# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  dashboard:
    welcome: "Welcome, %{email}!"
    streak_label: "Current Streak"
    streak_value:
      one: "1 Day"
      other: "%{count} Days"
    daily_goal_label: "Daily Goal"
    word_progress_label: "Word Progress"
    word_progress_zero_label: "New"
    word_progress_partial_label: "Partial"
    word_progress_full_label: "Full"
    word_progress_empty: "Start reviewing to see your word progress."
    word_progress_review_cta: "Begin review"
    word_progress_encourage:
      one: "%{count} new word — let's learn it!"
      other: "%{count} new words — let's learn them!"

  reviews:
    title: "Review"
    placeholder: "Type the word..."
    submit: "Check"
    master: "I know this word"
    done_title: "All cards reviewed!"
    done_message: "Come back later for your next review."
    back_to_dashboard: "Dashboard"
