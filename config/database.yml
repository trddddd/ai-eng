default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USER", "lingvize") %>
  password: <%= ENV.fetch("DB_PASSWORD", "lingvize") %>

development:
  <<: *default
  database: lingvize_development

test:
  <<: *default
  database: lingvize_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
